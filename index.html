<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2F6F68">
<title>아이약쏙 · 복약 타임라인 기록</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="app-header__main">
        <span class="app-header__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="9.5" width="17" height="7" rx="3.5" transform="rotate(-45 12 12)"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </span>
        <h1 class="app-header__title" id="screenTitle">홈</h1>
      </div>
      <button type="button" class="app-header__child" id="childBtn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg>
        <span id="childBtnLabel">아이 정보</span>
      </button>
    </header>

    <main class="screen" id="screenRoot"></main>

    <nav class="tabbar" id="tabbar">
      <button type="button" class="tab" data-screen="home">
        <span class="tab__icon">
          <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H10v-6h4v6h3.5a1 1 0 0 0 1-1v-9"/></svg>
        </span>
        <span class="tab__label">홈</span>
      </button>
      <button type="button" class="tab" data-screen="add">
        <span class="tab__icon">
          <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </span>
        <span class="tab__label">기록추가</span>
      </button>
      <button type="button" class="tab" data-screen="timeline">
        <span class="tab__icon">
          <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="4" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/><line x1="8" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="18" x2="20" y2="18"/></svg>
        </span>
        <span class="tab__label">타임라인</span>
      </button>
      <button type="button" class="tab" data-screen="summary">
        <span class="tab__icon">
          <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2.5"/><line x1="8" y1="16" x2="8" y2="11"/><line x1="12" y1="16" x2="12" y2="8"/><line x1="16" y1="16" x2="16" y2="13"/></svg>
        </span>
        <span class="tab__label">진료요약</span>
      </button>
      <button type="button" class="tab" data-screen="settings">
        <span class="tab__icon">
          <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.97 7.97 0 0 0 0-2l1.9-1.4-2-3.4-2.2.7a8 8 0 0 0-1.7-1L15 3.9h-4l-.4 2.9a8 8 0 0 0-1.7 1l-2.2-.7-2 3.4L6.6 11a7.97 7.97 0 0 0 0 2l-1.9 1.4 2 3.4 2.2-.7a8 8 0 0 0 1.7 1L11 20.1h4l.4-2.9a8 8 0 0 0 1.7-1l2.2.7 2-3.4Z"/></svg>
        </span>
        <span class="tab__label">설정</span>
      </button>
    </nav>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalBody" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="main.js"></script>
</body>
</html>
